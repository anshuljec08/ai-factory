specVersion: "3.0"
metadata:
  name: ai-factory-launchpad
type: application
framework:
  name: SAPUI5
  version: "1.120.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.layout
    - name: sap.f
    - name: sap.ushell
resources:
  configuration:
    paths:
      webapp: webapp
server:
  customMiddleware:
    - name: fiori-tools-servestatic
      afterMiddleware: compression
      configuration:
        paths:
          - path: /
            src: webapp