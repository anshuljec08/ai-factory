specVersion: "3.0"
metadata:
  name: ai-factory-launchpad
type: application
framework:
  name: SAPUI5
  version: "1.120.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ushell
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertError: false
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://sapui5.hana.ondemand.com
        backend:
          - path: /api
            url: http://localhost:3001
            destination: agent-registry
          - path: /agent-designer
            url: http://localhost:8080
          - path: /custom-ui
            url: http://localhost:8081
          - path: /mcp-builder
            url: http://localhost:8082