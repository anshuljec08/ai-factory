<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Factory</title>
    
    <script
        id="sap-ui-bootstrap"
        src="https://sapui5.hana.ondemand.com/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-libs="sap.m, sap.ushell, sap.ui.core"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-resourceroots='{
            "ai.factory.launchpad": "./"
        }'
        data-sap-ui-frameOptions="allow">
    </script>
    
    <script>
        sap.ui.getCore().attachInit(function() {
            // Initialize the Fiori Launchpad sandbox
            sap.ushell.Container.createRenderer("fiori2").then(function(oRenderer) {
                oRenderer.placeAt("content");
            });
        });
    </script>
    
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #content {
            height: 100%;
        }
    </style>
</head>
<body class="sapUiBody" id="content">
</body>
</html>
