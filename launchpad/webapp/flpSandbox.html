<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Factory - Fiori Launchpad</title>
    
    <script>
        window["sap-ushell-config"] = {
            defaultRenderer: "fiori2",
            bootstrapPlugins: {},
            renderers: {
                fiori2: {
                    componentData: {
                        config: {
                            enableSearch: false,
                            enablePersonalization: false,
                            enableSetTheme: true,
                            enableSetLanguage: true,
                            title: "AI Factory"
                        }
                    }
                }
            },
            applications: {
                "AgentDesigner-display": {
                    additionalInformation: "SAPUI5.Component=ai.factory.agentdesigner",
                    applicationType: "URL",
                    url: "/agent-designer/",
                    title: "Agent Designer",
                    description: "Create and manage AI agents",
                    icon: "sap-icon://create"
                },
                "CustomUI-display": {
                    additionalInformation: "SAPUI5.Component=ai.factory.customui",
                    applicationType: "URL",
                    url: "/custom-ui/",
                    title: "AI Chat",
                    description: "Chat with AI agents",
                    icon: "sap-icon://discussion"
                },
                "MCPBuilder-display": {
                    additionalInformation: "SAPUI5.Component=ai.factory.mcpbuilder",
                    applicationType: "URL",
                    url: "/mcp-builder/",
                    title: "MCP Builder",
                    description: "Build and test MCP tools",
                    icon: "sap-icon://wrench"
                },
                "Dashboard-display": {
                    additionalInformation: "SAPUI5.Component=ai.factory.dashboard",
                    applicationType: "URL",
                    url: "/dashboard/",
                    title: "Dashboard",
                    description: "Monitor agent metrics",
                    icon: "sap-icon://business-objects-experience"
                }
            },
            services: {
                NavTargetResolution: {
                    config: {
                        enableClientSideTargetResolution: true
                    }
                },
                LaunchPage: {
                    adapter: {
                        config: {
                            groups: [
                                {
                                    id: "ai-factory-main",
                                    title: "AI Factory",
                                    isPreset: true,
                                    isVisible: true,
                                    isGroupLocked: false,
                                    tiles: [
                                        {
                                            id: "agent-designer-tile",
                                            tileType: "sap.ushell.ui.tile.StaticTile",
                                            properties: {
                                                title: "Agent Designer",
                                                subtitle: "Create & Manage Agents",
                                                icon: "sap-icon://create",
                                                info: "Week 1",
                                                targetURL: "#AgentDesigner-display"
                                            }
                                        },
                                        {
                                            id: "custom-ui-tile",
                                            tileType: "sap.ushell.ui.tile.StaticTile",
                                            properties: {
                                                title: "AI Chat",
                                                subtitle: "Chat with Agents",
                                                icon: "sap-icon://discussion",
                                                info: "Coming Week 2",
                                                targetURL: "#CustomUI-display"
                                            }
                                        },
                                        {
                                            id: "mcp-builder-tile",
                                            tileType: "sap.ushell.ui.tile.StaticTile",
                                            properties: {
                                                title: "MCP Builder",
                                                subtitle: "Build & Test Tools",
                                                icon: "sap-icon://wrench",
                                                info: "Coming Week 2",
                                                targetURL: "#MCPBuilder-display"
                                            }
                                        },
                                        {
                                            id: "dashboard-tile",
                                            tileType: "sap.ushell.ui.tile.StaticTile",
                                            properties: {
                                                title: "Dashboard",
                                                subtitle: "Monitor Metrics",
                                                icon: "sap-icon://business-objects-experience",
                                                info: "Coming Later",
                                                targetURL: "#Dashboard-display"
                                            }
                                        }
                                    ]
                                }
                            ]
                        }
                    }
                }
            }
        };
    </script>
    
    <script
        id="sap-ui-bootstrap"
        src="https://sapui5.hana.ondemand.com/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-libs="sap.m, sap.ushell, sap.ui.core"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-frameOptions="allow">
    </script>
    
    <script>
        sap.ui.getCore().attachInit(function() {
            sap.ushell.Container.createRenderer("fiori2").then(function(oRenderer) {
                oRenderer.placeAt("content");
            });
        });
    </script>
    
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #content {
            height: 100%;
        }
    </style>
</head>
<body class="sapUiBody" id="content">
</body>
</html>
