<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Factory - Direct View Test</title>
    
    <script
        id="sap-ui-bootstrap"
        src="https://sapui5.hana.ondemand.com/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-libs="sap.m, sap.ui.core, sap.ui.layout"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-resourceroots='{
            "ai.factory.launchpad": "./"
        }'
        data-sap-ui-frameOptions="allow">
    </script>
    
    <script>
        sap.ui.getCore().attachInit(function() {
            console.log("UI5 Core initialized - Direct View Test");
            
            sap.ui.require([
                "sap/ui/core/mvc/XMLView"
            ], function(XMLView) {
                console.log("Loading XMLView directly...");
                
                XMLView.create({
                    viewName: "ai.factory.launchpad.view.Home"
                }).then(function(oView) {
                    console.log("View created successfully!");
                    oView.placeAt("content");
                    console.log("View placed in DOM");
                }).catch(function(error) {
                    console.error("Error creating view:", error);
                    document.getElementById("content").innerHTML = 
                        "<h1 style='color:red'>Error loading view</h1><pre>" + error.message + "</pre>";
                });
            });
        });
    </script>
    
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #content {
            height: 100%;
        }
    </style>
</head>
<body class="sapUiBody">
    <div id="content">
        <p>Loading...</p>
    </div>
</body>
</html>
