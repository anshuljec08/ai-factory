---
applications:
  - name: ai-factory-approuter
    memory: 128M
    disk_quota: 256M
    buildpacks:
      - nodejs_buildpack
    env:
      destinations: >
        [
          {
            "name": "agent-registry",
            "url": "https://d2o---demo-ai-dev-scf-ai-agent-ai-factory-agent-registry.cfapps.eu10-004.hana.ondemand.com",
            "forwardAuthToken": false
          },
          {
            "name": "ui-app",
            "url": "https://ai-factory-ui-agile-wolf-ju.cfapps.eu10-004.hana.ondemand.com",
            "forwardAuthToken": false
          }
        ]
      CORS: >
        [
          {
            "uriPattern": "^/api/.*$",
            "allowedOrigin": [{"host": "*", "protocol": "https"}],
            "allowedMethods": ["GET", "POST", "PUT", "DELETE", "OPTIONS"],
            "allowedHeaders": ["Content-Type", "Authorization"]
          }
        ]